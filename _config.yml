# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Gayashan Amarasinghe # the website title (if blank, full name will be used instead)
first_name: Gayashan
middle_name: 
last_name: Amarasinghe
email: gayashan.amarasinghe@gmail.com
# NOTE: ">-" not ">". The plain ">" leaves a trailing newline, which lands inside the
# schema.org JSON-LD string in metadata.html and makes it invalid JSON.
description: >-
  Gayashan Amarasinghe, a data engineer working on Australian energy market data.
  Data Technical Lead at an Australian gentailer, with a PhD in distributed systems.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: gayashan amarasinghe, data engineer, AEMO, NEM, National Electricity Market, MMS, MSATS, Databricks, Delta Lake, PySpark, Azure Data Factory, distributed systems, stream processing

lang: en # the language of your site (for example: en, fr, cn, ru, etc.)
icon: favicon.ico  # the emoji used as the favicon (alternatively, provide image name in /assets/img/)

url: https://gn.amrsnghe.org # the base hostname & protocol for your site (must match CNAME)
baseurl: # the subpath of your site, e.g. /blog/
last_updated: false # set to true if you want to display last updated in the footer
impressum_path:  # set to path to include impressum link in the footer, use the same path as permalink in a page, helps to conform with EU GDPR

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

# code highlighter theme
highlight_theme_light: github   # https://github.com/jwarby/jekyll-pygments-themes
highlight_theme_dark: native    # https://github.com/jwarby/jekyll-pygments-themes

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------

rss_icon: false

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true

# Dimensions
max_width: 800px

# TODO: add layout settings (single page vs. multi-page)

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------
# Display links to the page with a preview object on social media.
serve_og_meta: true # Include Open Graph meta tags in the HTML head
serve_schema_org: true # Include Schema.org in the HTML head
# NOTE: metadata.html emits this verbatim into content=, so it must be an absolute URL.
og_image: https://gn.amrsnghe.org/assets/img/prof_pic.jpeg

